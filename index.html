<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Moje investice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #fafafa;
    }
    h1 {
      margin-bottom: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }
    th {
      background: #f1f3f4;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr:nth-child(even) {
      background: #f9f9f9;
    }
    tr:hover {
      background: #e8f0fe;
    }
  </style>
</head>
<body>
  <h1>Moje investice</h1>
  <div id="table"></div>

  <script>
    fetch('Finance.csv')
      .then(response => response.text())
      .then(data => {
        const rows = data.trim().split('\n').map(r => r.split(','));
        let html = '<table>';
        rows.forEach((row, i) => {
          html += '<tr>';
          row.forEach(cell => {
            html += i === 0 
              ? `<th>${cell}</th>` 
              : `<td>${cell}</td>`;
          });
          html += '</tr>';
        });
        html += '</table>';
        document.getElementById('table').innerHTML = html;
      });
  </script>
</body>
</html>
